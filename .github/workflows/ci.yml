name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Syntax check ───────────────────────────────────────────────────────
      - name: Check Python syntax (py_compile)
        run: python -m py_compile bot.py && echo "✅ bot.py syntax OK"

      # ── 5. Import check ───────────────────────────────────────────────────────
      # Verifies all imports resolve correctly without actually running the bot
      - name: Check imports resolve
        run: |
          python -c "
          import ast, sys
          with open('bot.py', 'r', encoding='utf-8') as f:
              source = f.read()
          try:
              ast.parse(source)
              print('✅ AST parse OK — no syntax errors')
          except SyntaxError as e:
              print(f'❌ SyntaxError: {e}')
              sys.exit(1)
          "

      # ── 6. Lint with flake8 (warnings only, not blocking) ────────────────────
      - name: Lint with flake8 (non-blocking)
        run: |
          pip install flake8 --quiet
          # E501 = line too long (ignored — bot has long strings)
          # F401 = unused import, W503 = line break before operator
          flake8 bot.py \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --statistics \
            --count \
            --exit-zero
        continue-on-error: true

      # ── 7. Security scan with bandit ─────────────────────────────────────────
      - name: Security scan with bandit
        run: |
          pip install bandit --quiet
          bandit bot.py \
            --severity-level medium \
            --confidence-level medium \
            --quiet \
            -f txt \
            || true
        continue-on-error: true

      # ── 8. Confirm Docker build context is valid ─────────────────────────────
      - name: Validate Dockerfile exists
        run: |
          test -f Dockerfile && echo "✅ Dockerfile present"
          test -f requirements.txt && echo "✅ requirements.txt present"
          test -f bot.py && echo "✅ bot.py present"

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuhi Control Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Dark theme fallbacks for browser testing */
            --bg-color: var(--tg-theme-bg-color, #1e1e24);
            --text-color: var(--tg-theme-text-color, #f5f5f5);
            --hint-color: var(--tg-theme-hint-color, #a2a2a2);
            --link-color: var(--tg-theme-link-color, #3390ec);
            --btn-color: var(--tg-theme-button-color, #3390ec);
            --btn-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #2b2d35);
            --danger-color: #ff3b30;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-bottom: 70px;
            box-sizing: border-box;
        }
        * { box-sizing: border-box; }
        
        .tabbar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background-color: var(--secondary-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--hint-color);
            z-index: 1000;
        }
        .tab-btn {
            background: none; border: none;
            color: var(--hint-color);
            font-size: 12px;
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; padding: 5px; width: 20%;
        }
        .tab-btn.active { color: var(--btn-color); font-weight: bold; }
        .tab-icon { font-size: 20px; margin-bottom: 3px; }
        
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        
        h2 { margin-top: 0; font-size: 20px; }
        h3 { font-size: 16px; margin: 15px 0 10px; color: var(--hint-color); }
        
        .card {
            background-color: var(--secondary-bg);
            border-radius: 10px; padding: 15px; margin-bottom: 15px;
        }
        .stat-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .stat-box {
            background-color: var(--bg-color);
            padding: 15px; border-radius: 10px; text-align: center;
            border: 1px solid var(--hint-color);
        }
        .stat-num { font-size: 24px; font-weight: bold; color: var(--btn-color); margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: var(--hint-color); }
        
        input, select {
            width: 100%; padding: 10px;
            border-radius: 8px; border: 1px solid var(--hint-color);
            background-color: var(--bg-color); color: var(--text-color);
            margin-bottom: 10px; font-size: 14px;
        }
        button {
            width: 100%; padding: 12px;
            border-radius: 8px; border: none;
            background-color: var(--btn-color); color: var(--btn-text-color);
            font-size: 16px; font-weight: bold; cursor: pointer;
            margin-bottom: 10px;
        }
        button.danger { background-color: var(--danger-color); }
        button.small { width: auto; padding: 6px 12px; font-size: 12px; margin: 0; }
        
        .list-item {
            background-color: var(--secondary-bg);
            padding: 10px; border-radius: 8px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            word-break: break-all;
        }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--hint-color); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--btn-color); }
        input:checked + .slider:before { transform: translateX(22px); }
        
        .progress-bar { width: 100%; height: 10px; background-color: var(--hint-color); border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; background-color: var(--btn-color); transition: width 0.3s; }
        
        #toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff;
            text-align: center; border-radius: 8px; padding: 12px;
            position: fixed; z-index: 2000; left: 50%; bottom: 80px; transform: translateX(-50%);
            font-size: 14px;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 80px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 80px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        
        .banner { background-color: var(--btn-color); color: var(--btn-text-color); padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="dl-banner" class="banner">🚀 Download in progress...</div>

    <div id="tab-home" class="page active">
        <h2>Dashboard</h2>
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-num" id="s-sources">0</div>
                <div class="stat-label">Sources</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="s-files">0</div>
                <div class="stat-label">Downloaded Files</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="s-cookies">-</div>
                <div class="stat-label">Cookies Set</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="s-channel">None</div>
                <div class="stat-label">Channel</div>
            </div>
        </div>
        
        <div class="card" style="margin-top: 15px;">
            <h3>Disk Usage</h3>
            <div style="display: flex; justify-content: space-between; font-size: 12px;">
                <span id="disk-used">0 GB Used</span>
                <span id="disk-free">0 GB Free</span>
            </div>
            <div class="progress-bar">
                <div id="disk-fill" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div id="tab-sources" class="page">
        <h2>Sources</h2>
        <div class="card">
            <select id="src-platform">
                <option value="instagram">Instagram</option>
                <option value="tiktok">TikTok</option>
                <option value="facebook">Facebook</option>
                <option value="x">X (Twitter)</option>
            </select>
            <input type="url" id="src-url" placeholder="https://...">
            <button onclick="addSource()">Add Source</button>
        </div>
        <div id="sources-list"></div>
    </div>

    <div id="tab-download" class="page">
        <h2>Manual Download</h2>
        <div class="card">
            <label>Media Type</label>
            <select id="dl-media">
                <option value="both">Both (Photos & Videos)</option>
                <option value="photos">Photos Only</option>
                <option value="videos">Videos Only</option>
                <option value="documents">Files (as docs)</option>
            </select>
            
            <button onclick="startDownload()">🚀 Start Download</button>
            <button class="danger" onclick="stopDownload()">🛑 Stop Download</button>
        </div>
    </div>

    <div id="tab-history" class="page">
        <h2>History</h2>
        <div id="history-list"></div>
    </div>

    <div id="tab-settings" class="page">
        <h2>Settings</h2>
        
        <div class="card">
            <h3>Forwarding Channel</h3>
            <input type="text" id="set-channel" placeholder="@channel or ID">
            <button onclick="saveChannel()">Save Channel</button>
        </div>
        
        <div class="card">
            <h3>Auto Schedule</h3>
            <div class="toggle-row">
                <span>Enable Schedule</span>
                <label class="switch"><input type="checkbox" id="sch-enable"><span class="slider"></span></label>
            </div>
            <select id="sch-cron">
                <option value="6h">Every 6 Hours</option>
                <option value="12h">Every 12 Hours</option>
                <option value="24h">Every 24 Hours</option>
            </select>
            <button onclick="saveSchedule()">Save Schedule</button>
        </div>
        
        <div class="card">
            <h3>Cookies Manager</h3>
            <select id="cookie-platform">
                <option value="instagram">Instagram</option>
                <option value="tiktok">TikTok</option>
                <option value="facebook">Facebook</option>
                <option value="x">X (Twitter)</option>
            </select>
            <textarea id="cookie-data" placeholder="Paste Netscape cookie format here..." rows="4" style="width:100%; border-radius:8px; padding:10px; background:var(--bg-color); color:var(--text-color); border:1px solid var(--hint-color); margin-bottom:10px; font-family:monospace;"></textarea>
            <button onclick="saveCookie()">Save Cookie</button>
            <button class="danger" onclick="deleteCookie()">Delete Cookie</button>
            <div id="cookie-status" style="font-size: 12px; margin-top: 10px;"></div>
        </div>
    </div>

    <div class="tabbar">
        <button class="tab-btn active" onclick="nav('home')"><div class="tab-icon">🏠</div>Home</button>
        <button class="tab-btn" onclick="nav('sources')"><div class="tab-icon">📋</div>Sources</button>
        <button class="tab-btn" onclick="nav('download')"><div class="tab-icon">🚀</div>Download</button>
        <button class="tab-btn" onclick="nav('history')"><div class="tab-icon">📜</div>History</button>
        <button class="tab-btn" onclick="nav('settings')"><div class="tab-icon">⚙️</div>Settings</button>
    </div>

    <div id="toast">Message</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const API_HEADERS = {
            'Content-Type': 'application/json',
            'X-Init-Data': tg.initData || ''
        };

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function nav(tab) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.currentTarget.classList.add('active');
            if(tab === 'home') loadStats();
            if(tab === 'sources') loadSources();
            if(tab === 'history') loadHistory();
            if(tab === 'settings') loadSettings();
        }

        async function apiCall(path, method="GET", body=null) {
            try {
                const opt = { method, headers: API_HEADERS };
                if (body) opt.body = JSON.stringify(body);
                const res = await fetch(path, opt);
                if (!res.ok) throw new Error(await res.text());
                return await res.json();
            } catch (err) {
                showToast("Error: " + err.message);
                throw err;
            }
        }

        async function loadStats() {
            try {
                const s = await apiCall('/api/stats');
                document.getElementById('s-sources').innerText = s.total_profiles;
                document.getElementById('s-files').innerText = s.total_sent;
                document.getElementById('s-cookies').innerText = s.cookies.length ? s.cookies.join(", ") : "None";
                document.getElementById('s-channel').innerText = s.channel || "None";
                
                document.getElementById('dl-banner').style.display = s.download_active ? 'block' : 'none';
                
                const d = await apiCall('/api/disk');
                document.getElementById('disk-used').innerText = `${d.used_gb} GB Used`;
                document.getElementById('disk-free').innerText = `${d.free_gb} GB Free`;
                document.getElementById('disk-fill').style.width = `${d.percent}%`;
            } catch(e){}
        }

        async function loadSources() {
            try {
                const groups = await apiCall('/api/sources');
                let html = '';
                
                for(let p in groups) {
                    if(groups[p] && groups[p].length > 0) {
                        html += `<h3>${p.toUpperCase()}</h3>`;
                        groups[p].forEach(url => {
                            html += `
                            <div class="list-item">
                                <span style="font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:10px;">${url}</span>
                                <button class="danger small" onclick="delSource('${p}', '${url}')">Del</button>
                            </div>`;
                        });
                    }
                }
                document.getElementById('sources-list').innerHTML = html || '<p>No sources found.</p>';
            } catch(e){}
        }

        async function addSource() {
            const platform = document.getElementById('src-platform').value;
            const url = document.getElementById('src-url').value;
            if(!url) return;
            await apiCall('/api/sources', 'POST', {platform, url});
            document.getElementById('src-url').value = '';
            showToast("Source added!");
            loadSources();
        }

        async function delSource(platform, url) {
            if(confirm("Delete this source?")) {
                await apiCall('/api/sources', 'DELETE', {platform, url});
                showToast("Source deleted!");
                loadSources();
            }
        }

        async function loadHistory() {
            try {
                const data = await apiCall('/api/history');
                const hist = data.history || [];
                let html = '';
                hist.forEach(h => {
                    html += `
                    <div class="list-item" style="flex-direction:column; align-items:flex-start; font-size:12px;">
                        <div style="color:var(--btn-color); font-weight:bold; margin-bottom:5px;">${h.url || h.title || 'Unknown'}</div>
                        <div>Status: ${h.status || 'unknown'} | Media: ${h.sent || 0}</div>
                    </div>`;
                });
                document.getElementById('history-list').innerHTML = html || '<p>No history yet.</p>';
            } catch(e){}
        }

        async function loadSettings() {
            try {
                const c = await apiCall('/api/channel');
                document.getElementById('set-channel').value = c.channel || '';
                
                const s = await apiCall('/api/schedule');
                const scheduleStr = s.schedule || 'off';
                document.getElementById('sch-enable').checked = scheduleStr !== 'off';
                if(scheduleStr !== 'off') {
                    document.getElementById('sch-cron').value = scheduleStr;
                }
                
                updateCookieStatus();
            } catch(e){}
        }

        async function saveChannel() {
            const val = document.getElementById('set-channel').value;
            await apiCall('/api/channel', 'POST', {channel: val});
            showToast("Channel saved!");
        }

        async function saveSchedule() {
            const enabled = document.getElementById('sch-enable').checked;
            const cron = document.getElementById('sch-cron').value;
            const finalSchedule = enabled ? cron : 'off';
            await apiCall('/api/schedule', 'POST', {cron: finalSchedule});
            showToast("Schedule saved!");
        }

        async function updateCookieStatus() {
            try {
                const cookiesObj = await apiCall('/api/cookies');
                let html = '<strong>Active Cookies:</strong> ';
                let active = [];
                for(let p in cookiesObj) {
                    if(cookiesObj[p].has_cookie) active.push(p);
                }
                html += active.length ? active.join(", ") : "None";
                document.getElementById('cookie-status').innerHTML = html;
            } catch(e){}
        }

        async function saveCookie() {
            const platform = document.getElementById('cookie-platform').value;
            const data = document.getElementById('cookie-data').value;
            if(!data) { showToast("Cookie data empty!"); return; }
            await apiCall('/api/cookies', 'POST', {platform, content: data});
            document.getElementById('cookie-data').value = '';
            showToast("Cookie saved!");
            updateCookieStatus();
        }

        async function deleteCookie() {
            const platform = document.getElementById('cookie-platform').value;
            if(confirm("Delete cookie for " + platform + "?")) {
                await apiCall('/api/cookies', 'DELETE', {platform});
                showToast("Cookie deleted!");
                updateCookieStatus();
            }
        }

        async function startDownload() {
            const media = document.getElementById('dl-media').value;
            const platform = "all";
            
            await apiCall('/api/download', 'POST', {
                mode: media, platform
            });
            showToast("Download triggered!");
            document.getElementById('dl-banner').style.display = 'block';
        }

        async function stopDownload() {
            await apiCall('/api/download/stop', 'POST');
            showToast("Stop signal sent!");
            document.getElementById('dl-banner').style.display = 'none';
        }

        setInterval(async () => {
            try {
                const s = await apiCall('/api/download/status');
                document.getElementById('dl-banner').style.display = s.running ? 'block' : 'none';
            } catch(e){}
        }, 3000);

        loadStats();
    </script>
</body>
</html>
